name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'docs-site/**'
      - 'scripts/sync-docs-site.mjs'
      - 'scripts/fix-docs-site-build.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - uses: actions/configure-pages@v6

      - run: npm ci --legacy-peer-deps
      - run: npm run docs:build
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.DOCS_GA_MEASUREMENT_ID }}

      - name: Package Pages artifact
        run: tar --dereference --hard-dereference --directory docs-site/.vitepress/dist -cvf "$RUNNER_TEMP/artifact.tar" .

      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
