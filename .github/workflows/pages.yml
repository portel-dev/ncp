name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'docs-site/**'
      - 'scripts/sync-docs-site.mjs'
      - 'scripts/fix-docs-site-build.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci
      - run: npm run docs:build
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.DOCS_GA_MEASUREMENT_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
